services:
  db:
    image: postgres:16-alpine
    container_name: artemise-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: artemise
    ports:
      - "5432:5432"
    volumes:
      - artemise-pgdata:/var/lib/postgresql/data
      - ./backend/docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d artemise"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  artemise-pgdata:
